# セキュアOCR の配布物を CI でビルド
# - ① オフラインHTML版(dist-html.zip)  … 任意OSでビルド可(pure node)
# - ② Tauri Windows インストーラ(.exe/.msi) … windows-latest が唯一の生成手段(Macでは不可)
# 手動実行(workflow_dispatch) / タグ push(v*) で起動。タグ時のみ Release を作成し両方を添付。
# 未署名のため SHA256SUMS を併せて出力（USB配送途中の改ざん検知＝chain-of-custody用）。
name: build-dist

on:
  workflow_dispatch: {}
  push:
    tags: ['v*']
  pull_request:
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'scripts/**'
      - '.github/workflows/tauri.yml'

# 重いビルドの多重起動を防止
concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

# 既定は最小権限(read)。Release を作る job だけ write に昇格する。
permissions:
  contents: read

jobs:
  # ① オフラインHTML版（exe不要・file:// 直開き）
  build-html:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build offline HTML
        run: npm run build:html
      - name: Zip offline HTML bundle
        run: cd dist-html && zip -r -q ../KotenOCR-offline-html.zip . && cd .. && sha256sum KotenOCR-offline-html.zip | tee KotenOCR-offline-html.zip.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: KotenOCR-offline-html
          path: |
            KotenOCR-offline-html.zip
            KotenOCR-offline-html.zip.sha256
          if-no-files-found: error

  # ② Tauri Windows インストーラ
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'
      - name: Build Tauri app (Windows installers)
        run: npm run tauri build
      - name: Verify NSIS installer exists
        shell: pwsh
        run: if (-not (Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe)) { throw 'NSIS .exe が見つかりません' }
      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          $files = Get-ChildItem -Recurse -Include *.exe src-tauri/target/release/bundle
          $files | Get-FileHash -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  $(Split-Path $_.Path -Leaf)" } | Out-File -Encoding ascii src-tauri/target/release/bundle/SHA256SUMS.txt
          Get-Content src-tauri/target/release/bundle/SHA256SUMS.txt
      - uses: actions/upload-artifact@v4
        with:
          name: KotenOCR-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/SHA256SUMS.txt
          if-no-files-found: error

  # タグ push のときだけ Release を作成し、①②両方を添付
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-html, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-release/**/*.exe
            dist-release/**/*.zip
            dist-release/**/SHA256SUMS.txt
            dist-release/**/*.sha256
          body: |
            ## セキュアOCR — オフライン配布物

            閉域網(LGWAN系)/エアギャップPC向け。インターネット無しで動作します。

            ### ① オフラインHTML版（exe不要・どんな環境でも動く安全策）
            - `KotenOCR-offline-html.zip` を解凍 → `index.html` をダブルクリック。
            - USB配布時は、いったんローカルディスクにコピーしてから開くと速いです。

            ### ② Windows デスクトップアプリ（exe起動が許可された環境向け）
            - `*.exe`(NSISインストーラ)。WebView2 はオフライン同梱(x64)。
            - 未署名のため、環境によっては SmartScreen/AppLocker で警告・ブロックされることがあります。
              その場合は①のHTML版をご利用ください。

            ### 整合性
            - `SHA256SUMS.txt` / `*.sha256` で改ざん検知できます。
