# Tauri デスクトップアプリ（Windows .exe / .msi）を CI でビルド
# - 役所の閉域網PC用に、未署名インストーラ(NSIS .exe) と .msi を生成して Artifacts にアップロード。
# - 手動実行(workflow_dispatch) / タグ push(v*) で起動。タグ時のみ Release を作成。
# - WebView2 はオフラインインストーラ同梱(tauri.conf.json)＝エアギャップ環境でも導入可能。
#   ※ Mac では Windows exe は作れないため、配布用 exe はこの CI が唯一の生成手段。
# - 未署名のため SHA256SUMS を併せて生成（USB配送途中の改ざん検知＝chain-of-custody用）。
name: build-tauri

on:
  workflow_dispatch: {}
  push:
    tags: ['v*']
  pull_request:
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'scripts/**'
      - '.github/workflows/tauri.yml'

# 重いWindowsビルドの多重起動を防止
concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

# 既定は最小権限(read)。Release を作る job だけ write に昇格する。
permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm deps
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Build Tauri app (Windows installers)
        run: npm run tauri build

      # 片肺(MSI欠落 等)を個別に検知してから配布物をまとめる
      - name: Verify NSIS installer exists
        shell: pwsh
        run: if (-not (Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe)) { throw 'NSIS .exe が見つかりません' }

      - name: Verify MSI installer exists
        shell: pwsh
        run: if (-not (Get-ChildItem src-tauri/target/release/bundle/msi/*.msi)) { throw 'MSI が見つかりません' }

      # 改ざん検知用の SHA256SUMS を生成（受領側が独立検証できるように）
      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          $files = Get-ChildItem -Recurse -Include *.exe,*.msi src-tauri/target/release/bundle
          $files | Get-FileHash -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  $(Split-Path $_.Path -Leaf)" } | Out-File -Encoding ascii src-tauri/target/release/bundle/SHA256SUMS.txt
          Get-Content src-tauri/target/release/bundle/SHA256SUMS.txt

      - name: Upload installers (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: KotenOCR-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/SHA256SUMS.txt
          if-no-files-found: error

  release:
    # タグ push のときだけ Release を作成（PR/手動では発火しない）
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          name: KotenOCR-windows
          path: dist-installers

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-installers/**/*.exe
            dist-installers/**/*.msi
            dist-installers/**/SHA256SUMS.txt
